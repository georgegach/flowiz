<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flowiz — optical flow viewer</title>
    <meta
      name="description"
      content="Drag & drop optical flow files (.flo, KITTI PNG, .pfm, .npy) to visualize them in your browser. No upload, fully offline."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230a84ff'/%3E%3Cstop offset='1' stop-color='%235e5ce6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='url(%23g)'/%3E%3Cg fill='none' stroke='white' stroke-width='2.4' stroke-linecap='round'%3E%3Cpath d='M9 20c2-5 12-5 14 0'/%3E%3Cpath d='M9 14c2-5 12-5 14 0'/%3E%3C/g%3E%3C/svg%3E" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f6f8" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0f" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <script>
      // Apply the saved (or system-preferred) theme during parse, before the
      // module bundle loads — a deferred module script would flash the wrong
      // theme first. Classic inline scripts run synchronously here.
      (function () {
        try {
          var t = localStorage.getItem("flowiz.theme");
          var dark = t ? t === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* private mode — leave default light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
