name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build viewer
        working-directory: viewer
        run: |
          npm install
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build docs
        run: |
          pip install -e ".[docs]"
          mkdocs build --site-dir _docs_site

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r viewer/dist/* _site/
          mkdir -p _site/docs
          cp -r _docs_site/* _site/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
